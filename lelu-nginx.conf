# /etc/nginx/sites-available/lelu
# LELU Platform — nginx reverse proxy config
# Ubuntu 24.04 LTS | Next.js 16 app running on localhost:3000
#
# Deploy steps:
#   sudo cp lelu-nginx.conf /etc/nginx/sites-available/lelu
#   sudo ln -s /etc/nginx/sites-available/lelu /etc/nginx/sites-enabled/
#   sudo nginx -t
#   sudo systemctl reload nginx
#
# Replace 192.168.1.100 with your actual server IP before deploying.
# When a domain arrives, swap server_name to the domain and run Certbot.

server {
    listen 80;
    listen [::]:80;

    # Replace with your actual static IP.
    # Change to domain name (e.g. lelu.csa.gov.gh) when one is assigned.
    server_name 192.168.1.100;

    # -----------------------------------------------------------------------
    # Security headers
    # Applied on HTTP now; keep them when you move to HTTPS.
    # -----------------------------------------------------------------------
    add_header X-Frame-Options        "SAMEORIGIN"                   always;
    add_header X-Content-Type-Options "nosniff"                      always;
    add_header X-XSS-Protection       "1; mode=block"                always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # -----------------------------------------------------------------------
    # Upload size
    # The app accepts CDR attachments and international request documents.
    # 20 MB is generous for PDFs and scanned images; raise only if needed.
    # -----------------------------------------------------------------------
    client_max_body_size 20M;

    # -----------------------------------------------------------------------
    # Logging
    # Separate access log so LELU traffic is easy to grep without noise
    # from other future vhosts.
    # -----------------------------------------------------------------------
    access_log /var/log/nginx/lelu-access.log;
    error_log  /var/log/nginx/lelu-error.log;

    # -----------------------------------------------------------------------
    # Static uploads — served directly by nginx, not proxied to Next.js
    #
    # The upload API handler writes to:
    #   process.cwd()/public/uploads/
    # which on this server resolves to:
    #   /var/www/lelu/app/public/uploads/
    #
    # Serving these directly avoids a round-trip through Node for every
    # file download. The alias MUST end with a trailing slash.
    # -----------------------------------------------------------------------
    location /uploads/ {
        alias   /var/www/lelu/app/public/uploads/;
        expires 7d;
        add_header Cache-Control "public, immutable";

        # Don't let browsers execute anything in the uploads folder.
        add_header X-Content-Type-Options "nosniff" always;

        # If a file doesn't exist, fall through to Next.js rather than
        # returning a bare 404 from nginx.
        try_files $uri @nextjs;
    }

    # -----------------------------------------------------------------------
    # Next.js static assets (_next/static)
    # These are fingerprinted at build time, so they're safe to cache hard.
    # -----------------------------------------------------------------------
    location /_next/static/ {
        alias   /var/www/lelu/app/.next/static/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # -----------------------------------------------------------------------
    # Everything else → Next.js on localhost:3000
    # -----------------------------------------------------------------------
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;

        # Required for Next.js HMR websocket (no-op in production but
        # harmless to leave in).
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Forward the original request metadata so Next.js and NextAuth
        # can reconstruct the correct host and scheme.
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Bypass proxy cache when the client sends an upgrade header.
        proxy_cache_bypass $http_upgrade;

        # Timeouts — 60 s is fine for this app; raise if you add heavy
        # report generation that takes longer to respond.
        proxy_read_timeout    60s;
        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;
    }

    # Internal named location used by the uploads fallback above.
    location @nextjs {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host            $host;
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}

